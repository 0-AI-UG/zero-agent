<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#2563eb"/>
  <!-- Orbital ring — tilted ellipse around the zero -->
  <ellipse cx="16" cy="16" rx="13" ry="5.5" transform="rotate(-30 16 16)" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Zero shape — geometric rounded path -->
  <path d="M16 5.5C12.2 5.5 9.5 9.8 9.5 16c0 6.2 2.7 10.5 6.5 10.5s6.5-4.3 6.5-10.5c0-6.2-2.7-10.5-6.5-10.5z" stroke="white" stroke-width="2.2" fill="none"/>
  <!-- Inner glow dot -->
  <circle cx="16" cy="16" r="2.5" fill="white" opacity="0.9"/>
  <!-- Spark accents — small dots on the orbital path -->
  <circle cx="5.5" cy="10.5" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="26.5" cy="21.5" r="1.2" fill="white" opacity="0.7"/>
</svg>
