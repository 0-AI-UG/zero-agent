<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <meta name="theme-color" content="#15171a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Zero" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!--
      Manifest and apple-touch-icon links are injected post-build into
      dist/index.html (see web/build.ts). They are NOT in the source HTML
      because Bun's HTML bundler would try to hash /icons/icon-192.png,
      breaking the stable URL iOS needs at "Add to Home Screen" time.

      In dev (bun --hot src/index.html) iOS PWA install isn't testable
      anyway (no HTTPS), so the missing dev tags don't matter.
    -->
    <script>
      // Inject PWA tags at runtime — bun's HTML bundler tries to resolve
      // these as bundleable assets, but the files are copied verbatim from
      // web/public/ and need stable, unhashed URLs.
      (function() {
        var head = document.head;
        var m = document.createElement('link');
        m.rel = 'manifest';
        m.href = '/manifest.webmanifest';
        head.appendChild(m);
        var a = document.createElement('link');
        a.rel = 'apple-touch-icon';
        a.href = '/icons/icon-192.png';
        head.appendChild(a);
      })();
    </script>
    <script>
      // Prevent flash of wrong theme — runs synchronously before first paint
      (function() {
        var d = document.documentElement;
        var mode = 'dark';
        try {
          var raw = localStorage.getItem('color-mode-preference');
          if (raw) {
            var state = JSON.parse(raw).state;
            var stored = state && state.colorMode;
            if (stored === 'light') mode = 'light';
            else if (stored === 'system') mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            var css = state && state.customThemeCss;
            var theme = state && state.customTheme;
            if (theme || css) {
              var s = document.createElement('style');
              s.id = 'custom-theme';
              s.textContent = css || '';
              document.head.appendChild(s);
            }
          }
        } catch(e) {}
        if (mode === 'dark') d.classList.add('dark');
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet" />
    <title>Zero Agent</title>
    <script type="module" src="./frontend.tsx" async></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
