<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ZeroLoader preview</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0b0c;
        --fg: #e5e7eb;
        --muted: #9ca3af;
        --card: #161618;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, auto);
        gap: 32px;
        padding: 32px;
      }
      .card {
        background: var(--card);
        border: 1px solid #2a2a2e;
        border-radius: 12px;
        padding: 24px;
        display: grid;
        place-items: center;
        gap: 12px;
        min-width: 160px;
      }
      .card small {
        color: var(--muted);
      }
      .light {
        background: #f8fafc;
        color: #0f172a;
        border-color: #e2e8f0;
      }
      .light small {
        color: #64748b;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
      }
      svg {
        color: var(--muted);
      }
      .light svg {
        color: #64748b;
      }
      .big svg {
        width: 64px;
        height: 64px;
      }
      .huge svg {
        width: 128px;
        height: 128px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <!-- Reusable inline template duplicated for each size/theme -->
      <template id="zero-loader-tpl">
        <svg viewBox="0 0 32 32" fill="none" width="20" height="20">
          <defs>
            <path
              id="orbit"
              d="M 3 16 a 13 5.5 0 1 0 26 0 a 13 5.5 0 1 0 -26 0"
              transform="rotate(-30 16 16)"
            />
          </defs>
          <g transform="rotate(-30 16 16)">
            <path
              d="M 3 16 a 13 5.5 0 1 0 26 0 a 13 5.5 0 1 0 -26 0"
              stroke="currentColor"
              stroke-width="1.2"
              opacity="0.2"
            />
            <path
              d="M 3 16 a 13 5.5 0 1 0 26 0 a 13 5.5 0 1 0 -26 0"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
              stroke-dasharray="14 56"
              pathLength="70"
            >
              <animate
                attributeName="stroke-dashoffset"
                from="70"
                to="0"
                dur="2.2s"
                repeatCount="indefinite"
              />
            </path>
          </g>
          <path
            d="M16 5.5C12.2 5.5 9.5 9.8 9.5 16c0 6.2 2.7 10.5 6.5 10.5s6.5-4.3 6.5-10.5c0-6.2-2.7-10.5-6.5-10.5z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            opacity="0.2"
          />
          <path
            d="M16 5.5C12.2 5.5 9.5 9.8 9.5 16c0 6.2 2.7 10.5 6.5 10.5s6.5-4.3 6.5-10.5c0-6.2-2.7-10.5-6.5-10.5z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-dasharray="14 56"
            pathLength="70"
          >
            <animate
              attributeName="stroke-dashoffset"
              from="70"
              to="0"
              dur="1.4s"
              repeatCount="indefinite"
            />
          </path>
          <circle cx="16" cy="16" r="2.5" fill="currentColor" opacity="0.9" />
          <circle r="1.5" fill="currentColor">
            <animateMotion dur="2.2s" repeatCount="indefinite" rotate="auto">
              <mpath href="#orbit" />
            </animateMotion>
          </circle>
        </svg>
      </template>

      <div class="card" data-loader></div>
      <div class="card big" data-loader><small>64px</small></div>
      <div class="card huge" data-loader><small>128px</small></div>

      <div class="card light">
        <div class="row" data-loader-inline><span>Thinking</span></div>
        <small>light theme + label</small>
      </div>

      <div class="card">
        <div class="row" data-loader-inline><span>Thinking</span></div>
        <small>dark theme + label</small>
      </div>
    </div>

    <script>
      // animateMotion's mpath needs unique IDs per SVG instance; we mint
      // fresh ids when cloning the template into each card.
      const tpl = document.getElementById("zero-loader-tpl");
      let n = 0;

      function mintLoader() {
        const frag = tpl.content.cloneNode(true);
        const svg = frag.querySelector("svg");
        const id = `orbit-${++n}`;
        svg.querySelector("path#orbit").id = id;
        svg.querySelector("mpath").setAttribute("href", `#${id}`);
        return svg;
      }

      for (const card of document.querySelectorAll("[data-loader]")) {
        card.prepend(mintLoader());
        if (!card.querySelector("small")) {
          const s = document.createElement("small");
          s.textContent = "20px (in-app size)";
          card.appendChild(s);
        }
      }

      for (const row of document.querySelectorAll("[data-loader-inline]")) {
        row.prepend(mintLoader());
      }
    </script>
  </body>
</html>
