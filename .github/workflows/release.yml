name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.5"

jobs:
  build-server:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: zero-agent-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: zero-agent-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: zero-agent-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: zero-agent-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install
      - run: bun run --cwd web build.ts

      - name: Generate embedded assets
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const DIST = 'web/dist';
          const GEN = 'server/_generated';
          fs.mkdirSync(GEN, {recursive: true});
          const MIME = {'.html':'text/html','.js':'application/javascript','.css':'text/css','.svg':'image/svg+xml','.png':'image/png','.jpg':'image/jpeg','.ico':'image/x-icon','.json':'application/json','.woff':'font/woff','.woff2':'font/woff2'};
          const files = fs.readdirSync(DIST).filter(f => !f.endsWith('.map'));
          const entries = files.map(f => {
            const buf = fs.readFileSync(path.join(DIST, f));
            const ext = path.extname(f);
            const mime = MIME[ext] || 'application/octet-stream';
            const immutable = /[-\.][a-z0-9]{8,}\.\w+$/.test(f);
            return '  \"/' + f + '\": { data: Buffer.from(\"' + buf.toString('base64') + '\", \"base64\"), mime: \"' + mime + '\", immutable: ' + immutable + ' }';
          });
          fs.writeFileSync(path.join(GEN, 'assets.ts'), 'export const assets: Record<string, { data: Buffer; mime: string; immutable: boolean }> = {\n' + entries.join(',\n') + '\n};\n');
          "

      - name: Compile server binary
        run: bun build --compile --minify --target=${{ matrix.target }} server/index.ts --outfile=dist/${{ matrix.artifact }} --external=../web/src/index.html

      - name: Clean up generated files
        run: rm -rf server/_generated

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  build-companion:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: zero-agent-companion-linux-x64
          - os: macos-latest
            platform: mac
            artifact: zero-agent-companion-darwin-arm64
          - os: macos-13
            platform: mac
            artifact: zero-agent-companion-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: cd companion && bun install
      - run: cd companion && bunx electrobun build

      - name: Archive companion build
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C companion/build .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: [build-server, build-companion]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
