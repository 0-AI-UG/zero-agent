name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: bun install --frozen-lockfile

      - name: Typecheck server
        run: |
          errors=$(bun x tsc --noEmit 2>&1 | grep -E '^\S.*\([0-9]+,[0-9]+\)' | grep -v '^node_modules/' || true)
          if [ -n "$errors" ]; then echo "$errors"; exit 1; fi

      - name: Typecheck web
        run: bun x tsc --noEmit -p web/tsconfig.json
