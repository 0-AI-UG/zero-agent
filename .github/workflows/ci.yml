name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - run: bun install
      - run: cd companion && bun install

      - name: Typecheck server
        run: |
          errors=$(bunx tsc --noEmit 2>&1 | grep -E '^\S.*\([0-9]+,[0-9]+\)' | grep -v '^node_modules/' || true)
          if [ -n "$errors" ]; then echo "$errors"; exit 1; fi

      - name: Typecheck web
        run: bunx tsc --noEmit -p web/tsconfig.json

      - name: Typecheck companion
        run: |
          errors=$(cd companion && bunx tsc --noEmit 2>&1 | grep -E '^\S.*\([0-9]+,[0-9]+\)' | grep -v '^node_modules/' || true)
          if [ -n "$errors" ]; then echo "$errors"; exit 1; fi
