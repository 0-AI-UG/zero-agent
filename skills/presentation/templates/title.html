<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #0A0A0A;
    --surface:   #141414;
    --text:      #F5F5F5;
    --text-dim:  #A3A3A3;
    --text-mute: #525252;
    --accent:    #3B82F6;
    --border:    #262626;
  }

  body {
    background: #000;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .slide {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, #0A0A0A 0%, #0F0F1A 50%, #0A0A0A 100%);
  }

  /* Decorative accent line */
  .accent-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
  }

  /* Brand area */
  .brand {
    position: absolute;
    top: 64px;
    left: 100px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-mute);
  }

  /* Main content */
  .content {
    position: absolute;
    top: 50%;
    left: 100px;
    transform: translateY(-50%);
    max-width: 1400px;
  }

  .title {
    font-size: 96px;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .subtitle {
    margin-top: 32px;
    font-size: 32px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text-dim);
    max-width: 900px;
  }

  .meta {
    position: absolute;
    bottom: 64px;
    left: 100px;
    font-size: 20px;
    font-weight: 400;
    color: var(--text-mute);
  }

  /* Decorative shape */
  .deco-circle {
    position: absolute;
    top: 200px;
    right: 160px;
    width: 320px;
    height: 320px;
    border-radius: 160px;
    border: 2px solid var(--accent);
    opacity: 0.15;
  }
</style>
</head>
<body>

<div class="slide" aria-label="Title slide">
  <div class="accent-line"></div>
  <div class="brand">Company Name</div>
  <div class="content">
    <div class="title">Presentation Title Goes Here</div>
    <div class="subtitle">A concise subtitle that explains the purpose of this deck and sets expectations for the audience.</div>
  </div>
  <div class="meta">Author Name &middot; March 2026</div>
  <div class="deco-circle"></div>
</div>

</body>
</html>
