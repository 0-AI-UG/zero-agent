services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - data:/app/data
      # Pi runs as a child Node process inside this container; its
      # workspaces and per-chat session JSONLs live under /var/zero,
      # which we keep in a named volume so projects survive restarts.
      - zero-projects:/var/zero
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-}
      - CREDENTIALS_KEY=${CREDENTIALS_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - APP_URL=${APP_URL:-}
      - RP_ID=${RP_ID:-localhost}
      - RP_NAME=${RP_NAME:-ZeroAgent}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    mem_limit: 1200m
    memswap_limit: 1200m

volumes:
  data:
  zero-projects:
