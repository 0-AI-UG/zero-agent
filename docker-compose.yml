services:
  server:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - data:/app/data
    environment:
      - NODE_ENV=production
      - RUNNER_URL=http://runner:3100
      - RUNNER_API_KEY=${RUNNER_API_KEY:-}
    depends_on:
      - runner

  runner:
    build: runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - RUNNER_API_KEY=${RUNNER_API_KEY:-}
      - DEFAULT_IMAGE=zero-session:latest
      - IDLE_TIMEOUT_SECS=600
    ports:
      - "3100:3100"

volumes:
  data:
